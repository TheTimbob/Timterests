repos:
  - repo: local
    hooks:
      - id: make-build
        name: make build
        entry: make build
        language: system

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-xml

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(html|css|md)$
        language_version: system

  - repo: local
    hooks:
    - id: golangci-lint
      name: golangci-lint
      entry: golangci-lint run --config .golangci.yml --fix ./...
      types: [go]
      language: system
      pass_filenames: false
      always_run: true
    - id: clean-prettier-cache
      name: final project clean.
      entry: bash -c 'rm -rf node_modules/.cache'
      language: system
